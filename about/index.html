<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../image/icon.svg">
  <title>About — hrmc.ngs.computer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="../src/css/style.css">
  <style>
    /* ===== About page extras ===== */
    .about-page {
      min-height: 100dvh;
      padding: 8rem 0 6rem;
      position: relative;
      overflow: hidden;
    }

    /* 背景オーブ */
    .about-page::before,
    .about-page::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
    }
    .about-page::before {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -100px;
      left: -150px;
      animation: orb-drift 12s ease-in-out infinite alternate;
    }
    .about-page::after {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(62,207,207,0.08) 0%, transparent 70%);
      bottom: 0;
      right: -100px;
      animation: orb-drift 16s ease-in-out infinite alternate-reverse;
    }

    @keyframes orb-drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    .about-page .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: start;
      position: relative;
      z-index: 1;
    }

    /* ---- アニメーション基底 ---- */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-right {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes chip-pop {
      from { opacity: 0; transform: scale(0.75) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }
    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 0 rgba(124,106,247,0); }
      50%       { box-shadow: 0 0 40px rgba(124,106,247,0.15); }
    }

    /* ---- Left: profile ---- */
    .profile-label {
      font-family: var(--font-en);
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--accent2);
      margin-bottom: 0.8rem;
      opacity: 0;
      animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s forwards;
    }

    .profile-name {
      font-family: var(--font-en);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 0.6rem;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
      /* 名前にグラデーション */
      background: linear-gradient(120deg, #fff 30%, var(--accent) 60%, var(--accent2) 90%, #fff 110%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fade-up 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards,
                 shimmer 5s linear 1s infinite;
    }

    .profile-handle {
      font-family: var(--font-en);
      font-size: 0.9rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.32s forwards;
    }

    .profile-bio {
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.44s forwards;
    }

    .profile-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
    }

    /* chip は JS でディレイを設定 */
    .profile-chips .chip {
      opacity: 0;
      animation: chip-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    .profile-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-en);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-decoration: none;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 0.5em 1em;
      border-radius: 100px;
      transition: border-color 0.3s, color 0.3s, transform 0.3s;
      opacity: 0;
      animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.9s forwards;
    }

    .profile-back:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateX(-4px);
    }

    /* ---- Right: code block ---- */
    .code-wrap {
      position: sticky;
      top: 7rem;
      opacity: 0;
      animation: fade-right 0.8s cubic-bezier(0.22,1,0.36,1) 0.35s forwards,
                 glow-pulse 4s ease-in-out 1.5s infinite;
    }

    .code-file {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #161b22;
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom: none;
      border-radius: 12px 12px 0 0;
      padding: 0.7rem 1.2rem;
      font-family: var(--font-en);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* タイピングカーソル */
    .code-file::after {
      content: '';
      display: inline-block;
      width: 6px;
      height: 0.85em;
      background: var(--accent2);
      margin-left: 0.4rem;
      border-radius: 1px;
      animation: cursor-blink 1.1s step-end infinite;
      vertical-align: middle;
      opacity: 0.7;
    }

    .code-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .code-dot.red    { background: #ff5f57; }
    .code-dot.yellow { background: #febc2e; }
    .code-dot.green  { background: #28c840; }

    .hljs {
      background: #0d1117 !important;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 0 0 12px 12px;
      padding: 1.8rem !important;
      font-family: 'JetBrains Mono', monospace !important;
      font-size: 0.82rem !important;
      line-height: 1.75 !important;
      overflow-x: auto;
    }

    /* ---- Info section (birthday + education) ---- */
    .profile-info {
      margin-bottom: 2rem;
      opacity: 0;
      animation: fade-up 0.6s cubic-bezier(0.22,1,0.36,1) 0.52s forwards;
    }

    .info-birthday {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
      letter-spacing: 0.03em;
    }

    .info-birthday strong {
      color: var(--accent2);
      font-family: var(--font-en);
    }

    .edu-timeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      padding-left: 1.2rem;
    }

    .edu-timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.55em;
      bottom: 0.55em;
      width: 1px;
      background: linear-gradient(to bottom, var(--accent) 0%, var(--accent2) 100%);
      opacity: 0.35;
    }

    .edu-item {
      display: flex;
      align-items: baseline;
      gap: 0.8rem;
      padding: 0.35rem 0;
      font-size: 0.82rem;
      position: relative;
    }

    .edu-item::before {
      content: '';
      position: absolute;
      left: -1.2rem;
      top: 50%;
      transform: translateY(-50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent2);
      opacity: 0.7;
    }

    .edu-date {
      font-family: var(--font-en);
      font-size: 0.75rem;
      color: var(--accent2);
      opacity: 0.7;
      white-space: nowrap;
      min-width: 5.5rem;
    }

    .edu-label {
      color: var(--text-muted);
    }

    /* ===== Responsive ===== */
    @media (max-width: 750px) {
      .about-page {
        padding: 4rem 0 3rem;
      }

      .about-page .container {
        grid-template-columns: 1fr;
        gap: 2rem;
        padding: 0 1.2rem;
      }

      .about-page::before {
        width: 300px;
        height: 300px;
        top: -60px;
        left: -80px;
      }
      .about-page::after {
        width: 250px;
        height: 250px;
      }

      .profile-name {
        font-size: clamp(1.8rem, 8vw, 2.6rem);
      }

      .profile-handle {
        font-size: 0.8rem;
        margin-bottom: 1.4rem;
      }

      .profile-bio {
        font-size: 0.9rem;
        line-height: 1.7;
        margin-bottom: 1.4rem;
      }

      .profile-chips {
        gap: 0.4rem;
        margin-bottom: 1.8rem;
      }

      .profile-chips .chip {
        font-size: 0.68rem;
        padding: 0.25em 0.7em;
      }

      .edu-item {
        font-size: 0.75rem;
        gap: 0.5rem;
      }

      .edu-date {
        font-size: 0.68rem;
        min-width: 4.5rem;
      }

      .info-birthday {
        font-size: 0.78rem;
      }

      .code-wrap {
        position: static;
      }

      .code-file {
        padding: 0.5rem 0.9rem;
        font-size: 0.68rem;
      }

      .code-dot {
        width: 8px;
        height: 8px;
      }

      .hljs {
        padding: 1.2rem !important;
        font-size: 0.7rem !important;
        line-height: 1.6 !important;
      }

      .profile-back {
        font-size: 0.75rem;
      }
    }

    /* prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div class="noise"></div>

  <section class="about-page">
    <div class="container">

      <!-- Left: profile -->
      <div class="profile-left">
        <p class="profile-label" id="profile-label"></p>
        <h1 class="profile-name" id="profile-name"></h1>
        <p class="profile-handle" id="profile-handle"></p>

        <p class="profile-bio" id="profile-bio"></p>

        <div class="profile-chips" id="profile-chips"></div>

        <div class="profile-info" id="profile-info"></div>

        <a class="profile-back" href="/">← Back</a>
      </div>

      <!-- Right: code block -->
      <div class="code-wrap">
        <div class="code-file">
          <span class="code-dot red"></span>
          <span class="code-dot yellow"></span>
          <span class="code-dot green"></span>
          <span id="code-file-name"></span>
        </div>
        <pre><code class="language-javascript" id="code-block"></code></pre>
      </div>

    </div>
  </section>

  <script src="../src/js/content.js"></script>
  <script>
    // chip が DOM に追加されたら stagger ディレイをセット
    new MutationObserver((_, obs) => {
      const chips = document.querySelectorAll('#profile-chips .chip');
      if (!chips.length) return;
      chips.forEach((el, i) => {
        el.style.animationDelay = `${0.58 + i * 0.06}s`;
      });
      obs.disconnect();
    }).observe(document.getElementById('profile-chips'), { childList: true });
  </script>
</body>
</html>

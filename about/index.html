<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../image/icon.svg">
  <title>About — hrmc.ngs.computer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="../src/css/style.css">
  <link rel="stylesheet" href="../src/css/about-style.css">
</head>
<body>

  <div class="noise"></div>

  <section class="about-page">
    <div class="container">

      <!-- Left: profile -->
      <div class="profile-left">
        <p class="profile-label" id="profile-label"></p>
        <h1 class="profile-name" id="profile-name"></h1>
        <p class="profile-handle" id="profile-handle"></p>

        <p class="profile-bio" id="profile-bio"></p>

        <div class="profile-chips" id="profile-chips"></div>

        <div class="profile-info" id="profile-info"></div>

        <a class="profile-back" href="/">← Back</a>
      </div>

      <!-- Right: code block -->
      <div class="code-wrap">
        <div class="code-file">
          <span class="code-dot red"></span>
          <span class="code-dot yellow"></span>
          <span class="code-dot green"></span>
          <span id="code-file-name"></span>
        </div>
        <pre><code class="language-javascript" id="code-block"></code></pre>
      </div>

    </div>
  </section>

  <script src="../src/js/content.js"></script>
  <script>
    // chip が DOM に追加されたら stagger ディレイをセット
    new MutationObserver((_, obs) => {
      const chips = document.querySelectorAll('#profile-chips .chip');
      if (!chips.length) return;
      chips.forEach((el, i) => {
        el.style.animationDelay = `${0.58 + i * 0.06}s`;
      });
      obs.disconnect();
    }).observe(document.getElementById('profile-chips'), { childList: true });
  </script>
</body>
</html>

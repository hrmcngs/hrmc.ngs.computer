  <rect x="44" y="8"  width="4" height="4" fill="#c04010"/>
  <rect x="12" y="12" width="4" height="4" fill="#c04010"/>
  <rect x="48" y="12" width="4" height="4" fill="#c04010"/>
  <rect x="12" y="16" width="4" height="4" fill="#c04010"/>
  <rect x="28" y="16" width="8" height="4" fill="#c04010"/>
  <rect x="48" y="16" width="4" height="4" fill="#c04010"/>
  <rect x="8"  y="20" width="4" height="4" fill="#c04010"/>
  <rect x="52" y="20" width="4" height="4" fill="#c04010"/>
  <rect x="8"  y="24" width="4" height="4" fill="#c04010"/>
  <rect x="52" y="24" width="4" height="4" fill="#c04010"/>
  <rect x="8"  y="28" width="4" height="4" fill="#c04010"/>
  <rect x="52" y="28" width="4" height="4" fill="#c04010"/>
  <rect x="8"  y="32" width="4" height="4" fill="#c04010"/>
  <rect x="52" y="32" width="4" height="4" fill="#c04010"/>
  <rect x="12" y="36" width="4" height="4" fill="#c04010"/>
  <rect x="48" y="36" width="4" height="4" fill="#c04010"/>
  <rect x="12" y="40" width="4" height="4" fill="#c04010"/>
  <rect x="48" y="40" width="4" height="4" fill="#c04010"/>
  <rect x="16" y="44" width="4" height="4" fill="#c04010"/>
  <rect x="44" y="44" width="4" height="4" fill="#c04010"/>

  <!-- 花びら メイン (orange #e87030) -->
  <rect x="20" y="8"  width="4" height="4" fill="#e87030"/>

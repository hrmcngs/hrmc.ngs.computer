  <!-- 中心 黄色 (yellow #f8c030) -->
  <rect x="28" y="20" width="8" height="4" fill="#f8c030"/>
  <rect x="24" y="24" width="16" height="4" fill="#f8c030"/>
  <rect x="20" y="28" width="8" height="4" fill="#f8c030"/>
  <rect x="36" y="28" width="8" height="4" fill="#f8c030"/>
  <rect x="20" y="32" width="8" height="4" fill="#f8c030"/>
  <rect x="36" y="32" width="8" height="4" fill="#f8c030"/>
  <rect x="28" y="36" width="8" height="4" fill="#f8c030"/>

  <!-- 雄しべ (bright yellow #fce040) -->
  <rect x="28" y="28" width="8" height="8" fill="#fce040"/>

  <!-- 茎 (dark green #2a5018) -->
  <rect x="28" y="48" width="8" height="16" fill="#2a5018"/>

  <!-- 葉 左 (green #508030) -->
  <rect x="16" y="56" width="4" height="4" fill="#508030"/>
  <rect x="12" y="60" width="8" height="4" fill="#508030"/>
  <rect x="20" y="60" width="4" height="4" fill="#6aaa40"/>

  <!-- 葉 右 (green #508030) -->
  <rect x="44" y="56" width="4" height="4" fill="#508030"/>
  <rect x="44" y="60" width="8" height="4" fill="#508030"/>
  <rect x="40" y="60" width="4" height="4" fill="#6aaa40"/>

  <rect x="16" y="12" width="12" height="4" fill="#e87030"/>
  <rect x="36" y="12" width="12" height="4" fill="#e87030"/>
  <rect x="16" y="16" width="8" height="4" fill="#e87030"/>
  <rect x="40" y="16" width="8" height="4" fill="#e87030"/>
  <rect x="12" y="20" width="8" height="4" fill="#e87030"/>
  <rect x="44" y="20" width="8" height="4" fill="#e87030"/>
  <rect x="12" y="24" width="4" height="4" fill="#e87030"/>
  <rect x="48" y="24" width="4" height="4" fill="#e87030"/>
  <rect x="12" y="28" width="4" height="4" fill="#e87030"/>
  <rect x="48" y="28" width="4" height="4" fill="#e87030"/>

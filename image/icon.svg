<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="14" fill="#0d0d0f"/>

  <!-- blade -->
  <line x1="32" y1="6" x2="32" y2="46" stroke="#e8e8f0" stroke-width="2" stroke-linecap="round"/>
  <!-- tip bevel -->
  <line x1="32" y1="46" x2="36" y2="38" stroke="#e8e8f0" stroke-width="2" stroke-linecap="round"/>

  <!-- tsuba (guard) -->
  <ellipse cx="32" cy="46" rx="9" ry="3.5" fill="none" stroke="#7c6af7" stroke-width="2"/>

  <!-- handle wrap lines -->
  <line x1="29" y1="50" x2="35" y2="50" stroke="#3ecfcf" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="53" x2="35" y2="53" stroke="#3ecfcf" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="56" x2="35" y2="56" stroke="#3ecfcf" stroke-width="1.5" stroke-linecap="round"/>

  <!-- pommel -->
  <rect x="28" y="57" width="8" height="3" rx="1.5" fill="#7c6af7"/>

  <!-- glow -->
  <line x1="32" y1="6" x2="32" y2="44" stroke="#7c6af7" stroke-width="4" stroke-linecap="round" opacity="0.15"/>
</svg>

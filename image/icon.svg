  <rect x="20" y="44" width="24" height="4" fill="#e87030"/>

  <!-- 花びら 内側 (light orange #f0a060) -->
  <rect x="24" y="16" width="4" height="4" fill="#f0a060"/>
  <rect x="36" y="16" width="4" height="4" fill="#f0a060"/>
  <rect x="20" y="20" width="8" height="4" fill="#f0a060"/>
  <rect x="36" y="20" width="8" height="4" fill="#f0a060"/>
  <rect x="16" y="24" width="8" height="4" fill="#f0a060"/>
  <rect x="40" y="24" width="8" height="4" fill="#f0a060"/>
  <rect x="16" y="28" width="4" height="4" fill="#f0a060"/>
  <rect x="44" y="28" width="4" height="4" fill="#f0a060"/>

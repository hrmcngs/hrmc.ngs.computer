<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="image/icon.svg">
  <title>hrmc.ngs.computer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>

  <!-- ノイズオーバーレイ -->
  <div class="noise"></div>

  <!-- ヒーロー -->
  <section class="hero">
    <div class="hero-bg">
      <!-- <img src="image/zukei_background.jpg" alt="" class="hero-bg-img"> -->
      <div class="hero-overlay"></div>
      <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;"></canvas>
    </div>

    <div class="hero-content">
      <p class="hero-tag" id="hero-tag"></p>
      <h3 class="hero-title" id="hero-title"></h3>
      <p class="hero-sub" id="hero-sub"></p>
      <a href="#terminal" class="scroll-btn">
        <span>scroll</span>
        <svg width="16" height="24" viewBox="0 0 16 24"><path d="M8 0v20M1 13l7 7 7-7" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
    </div>

  </section>

  <!-- About -->
  <section class="section" id="about">
    <div class="container">
      <h2 class="section-title"><span class="tag">01</span> About</h2>
      <div class="about-grid">
        <div class="about-text" id="about-text"></div>
        <a href="/about" class="about-more">About me →</a>
      </div>
    </div>
  </section>

  <!-- Links -->
  <section class="section section--dark" id="links">
    <div class="container">
      <h2 class="section-title"><span class="tag">02</span> Links</h2>

      <div class="links-group">
        <h3 class="links-name" id="links-group-name"></h3>
        <div class="links-row" id="links-row"></div>
      </div>

    </div>
  </section>

  <!-- Works -->
  <section class="section" id="works">
    <div class="container">
      <h2 class="section-title"><span class="tag">03</span> Works</h2>
      <div class="works-grid" id="works-grid"></div>

    </div>
  </section>

  <!-- Terminal -->
  <section class="section section--dark" id="terminal">
    <div class="container">
      <h2 class="section-title"><span class="tag">04</span> Terminal</h2>
      <div class="term-wrap" id="term-wrap">
        <div class="term-bar">
          <span class="term-dot red"></span>
          <span class="term-dot yellow"></span>
          <span class="term-dot green"></span>
          <span class="term-title" id="term-title"></span>
        </div>
        <div class="term-body" id="term-body">
        </div>
        <div class="term-input-row">
          <span class="term-prompt" id="term-prompt"></span>
          <input class="term-input" id="term-input" type="text" autocomplete="off" spellcheck="false">
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-logo" id="footer-logo"></p>
      <p class="footer-copy" id="footer-copy"></p>
    </div>
  </footer>

  <script src="src/js/content.js"></script>
  <script src="src/js/index.js"></script>
  <script src="src/js/terminal.js"></script>
  <script src="src/js/hero-weather.js"></script>
</body>
</html>

name: Deploy to GitHub Pages

# GitHub Pages のデプロイをカスタムワークフロー化。
# charts/ の更新では再ビルドしない（自動チャート更新が Pages を巻き込まないように）。

on:
  push:
    branches: [main]
    paths-ignore:
      - 'charts/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 進行中のビルドをキャンセルせずキューに積む（push が重なってもキャンセルされない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
